<!DOCTYPE html>
<html>
<head>
    <title> MOOSIC - Library </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="home-container">
        <div class="home-logo">
            <img src="music-logo2.png" alt="Music Logo">
        </div>
        <div class="nav">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
					<li><a href="new.html">New</a></li>
                    <li><a href="explore.html">Explore</a></li>
                    <li><a href="library.html" class="active">Library</a></li>
                    <li><a href="register.html">Register</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="song-container">
        <h2>Library</h2>
        <div class="song-grid" id="library-grid">
            <div class="empty-library" id="empty-library">
                <p>Your library is empty</p>
                <p>Add songs from New or Explore to get started!</p>
            </div>
        </div>
    </main>

    <div class="music-player">
        <div class="player-info">
            <img src="song1.jpg" alt="Current Song" class="player-img">
            <div class="player-text">
                <h3 id="current-song">Stress Relief</h3>
                <p id="current-artist">Late Night Drive Home</p>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" onclick="prevSong()">⏮</button>
            <button class="control-btn" onclick="togglePlay()" id="play-btn">▶</button>
            <button class="control-btn" onclick="nextSong()">⏭</button>
        </div>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div class="popup" id="song-popup">
        <div class="popup-content">
            <span class="close-btn" onclick="closePopup()">&times;</span>
            <img src="song1.jpg" alt="Album Art" class="popup-img">
            <h2 id="popup-title">Stress Relief</h2>
            <p id="popup-artist">Late Night Drive Home</p>
            <button class="play-btn" onclick="playPopupSong()">Play Now</button>
            <button class="add-to-library-btn" onclick="addToLibrary()">Add to Library</button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        let isPlaying = false;
        let currentSongIndex = 0;
        let librarySongs = [];
        let currentPopupSong = null;

        const audioPlayer = document.getElementById('audio-player');
        const progress = document.getElementById('progress');
        const progressBar = document.querySelector('.progress-bar');
        const libraryGrid = document.getElementById('library-grid');
        const emptyLibrary = document.getElementById('empty-library');
        let isDragging = false;

        function openPopup(title, artist, img, audio) {
            document.getElementById('popup-title').textContent = title;
            document.getElementById('popup-artist').textContent = artist;
            document.querySelector('.popup-img').src = img;
            document.getElementById('song-popup').style.display = 'flex';
            currentPopupSong = { title, artist, img, audio };
        }

        function closePopup() {
            document.getElementById('song-popup').style.display = 'none';
        }

        function playPopupSong() {
            const popupTitle = document.getElementById('popup-title').textContent;
            const popupArtist = document.getElementById('popup-artist').textContent;
            const popupImg = document.querySelector('.popup-img').src;
            const popupAudio = document.querySelector('.popup-img').src.replace('song', 'audio').replace('.jpg', '.mp3');
            document.getElementById('current-song').textContent = popupTitle;
            document.getElementById('current-artist').textContent = popupArtist;
            document.querySelector('.player-img').src = popupImg;
            audioPlayer.src = popupAudio;
            audioPlayer.play();
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
            closePopup();
        }

        function addToLibrary() {
            if (currentPopupSong && !librarySongs.some(song => song.title === currentPopupSong.title)) {
                librarySongs.push(currentPopupSong);
                updateLibrary();
                closePopup();
                alert(currentPopupSong.title + ' added to library!');
            }
        }

        function updateLibrary() {
            if (librarySongs.length === 0) {
                libraryGrid.innerHTML = '<div class="empty-library" id="empty-library"><p>Your library is empty</p><p>Add songs from Explore or New to get started!</p></div>';
            } else {
                libraryGrid.innerHTML = '';
                librarySongs.forEach(song => {
                    const songCard = document.createElement('div');
                    songCard.className = 'song-card';
                    songCard.onclick = () => openPopup(song.title, song.artist, song.img, song.audio);
                    songCard.innerHTML = `
                        <img src="${song.img}" alt="${song.title}">
                        <div class="song-info">
                            <h3>${song.title}</h3>
                            <p>${song.artist}</p>
                        </div>
                    `;
                    libraryGrid.appendChild(songCard);
                });
            }
        }

        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                document.getElementById('play-btn').textContent = '▶';
            } else {
                audioPlayer.play();
                isPlaying = true;
                document.getElementById('play-btn').textContent = '⏸';
            }
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % librarySongs.length;
            updatePlayer();
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + librarySongs.length) % librarySongs.length;
            updatePlayer();
        }

        function updatePlayer() {
            if (librarySongs.length === 0) return;
            const song = librarySongs[currentSongIndex];
            document.getElementById('current-song').textContent = song.title;
            document.getElementById('current-artist').textContent = song.artist;
            document.querySelector('.player-img').src = song.img;
            audioPlayer.src = song.audio;
            audioPlayer.play();
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
        }

        document.getElementById('song-popup').addEventListener('click', function(e) {
            if (e.target === this) {
                closePopup();
            }
        });

        audioPlayer.addEventListener('ended', function() {
            nextSong();
        });

        audioPlayer.addEventListener('timeupdate', function() {
            const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progress.style.width = progressPercent + '%';
        });

        progress.addEventListener('mousedown', function(e) {
            isDragging = true;
            updateProgress(e);
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging) {
                updateProgress(e);
            }
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
        });

        function updateProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            const percent = (clickX / width) * 100;
            audioPlayer.currentTime = (clickX / width) * duration;
            progress.style.width = percent + '%';
        }
    </script>
</body>
</html>

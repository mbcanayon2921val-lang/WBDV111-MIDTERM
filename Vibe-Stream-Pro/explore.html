<!DOCTYPE html>
<html>
<head>
    <title> MOOSIC - Explore </title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="home-container">
        <div class="home-logo">
            <img src="music-logo2.png" alt="Music Logo">
        </div>
        <div class="nav">
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
					<li><a href="new.html">New</a></li>
                    <li><a href="explore.html" class="active">Explore</a></li>
                    <li><a href="library.html">Library</a></li>
                    <li><a href="register.html">Register</a></li>
                    <li><a href="login.html">Login</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="song-container">
        <h2>Explore</h2>
        <div class="song-grid">
            <div class="song-card" onclick="openPopup('Stress Relief', 'Late Night Drive Home', 'song1.jpg', 'audio1.mp3')">
                <img src="song1.jpg" alt="Stress Relief">
                <div class="song-info">
                    <h3>Stress Relief</h3>
                    <p>Late Night Drive Home</p>
                </div>
            </div>
            <div class="song-card" onclick="openPopup('Real Man', 'Beabadoobee', 'song2.jpg', 'audio2.mp3')">
                <img src="song2.jpg" alt="Real Man">
                <div class="song-info">
                    <h3>Real Man</h3>
                    <p>Beabadoobee</p>
                </div>
            </div>
            <div class="song-card" onclick="openPopup('I Think I Like It When It Rains', 'WILLIS', 'song3.jpg', 'audio3.mp3')">
                <img src="song3.jpg" alt="I Think I Like It When It Rains">
                <div class="song-info">
                    <h3>I Think I Like It When It Rains</h3>
                    <p>WILLIS</p>
                </div>
            </div>
            <div class="song-card" onclick="openPopup('Apocalypse', 'Cigarettes After Sex', 'song4.jpg', 'audio4.mp3')">
                <img src="song4.jpg" alt="Apocalypse">
                <div class="song-info">
                    <h3>Apocalypse</h3>
                    <p>Cigarettes After Sex</p>
                </div>
            </div>
        </div>
    </main>

    <div class="music-player">
        <div class="player-info">
            <img src="song1.jpg" alt="Current Song" class="player-img">
            <div class="player-text">
                <h3 id="current-song">Stress Relief</h3>
                <p id="current-artist">Late Night Drive Home</p>
            </div>
        </div>
        <div class="player-controls">
            <button class="control-btn" onclick="prevSong()">⏮</button>
            <button class="control-btn" onclick="togglePlay()" id="play-btn">▶</button>
            <button class="control-btn" onclick="nextSong()">⏭</button>
        </div>
        <div class="progress-bar">
            <div class="progress" id="progress"></div>
        </div>
    </div>

    <div class="popup" id="song-popup">
        <div class="popup-content">
            <span class="close-btn" onclick="closePopup()">&times;</span>
            <img src="song1.jpg" alt="Album Art" class="popup-img">
            <h2 id="popup-title">Stress Relief</h2>
            <p id="popup-artist">Late Night Drive Home</p>
            <button class="play-btn" onclick="playPopupSong()">Play Now</button>
            <button class="add-to-library-btn" onclick="addToLibrary()">Add to Library</button>
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        let isPlaying = false;
        let currentSongIndex = 0;
        const songs = [
            { title: 'Stress Relief', artist: 'Late Night Drive Home', img: 'song1.jpg', audio: 'audio1.mp3' },
            { title: 'Real Man', artist: 'Beabadoobee', img: 'song2.jpg', audio: 'audio2.mp3' },
            { title: 'I Think I Like It When It Rains', artist: 'WILLIS', img: 'song3.jpg', audio: 'audio3.mp3' },
            { title: 'Apocalypse', artist: 'Cigarettes After Sex', img: 'song4.jpg', audio: 'audio4.mp3' }
        ];

        let librarySongs = [];
        let currentPopupSong = null;

        const audioPlayer = document.getElementById('audio-player');
        const progress = document.getElementById('progress');
        const progressBar = document.querySelector('.progress-bar');
        let isDragging = false;

        function openPopup(title, artist, img, audio) {
            document.getElementById('popup-title').textContent = title;
            document.getElementById('popup-artist').textContent = artist;
            document.querySelector('.popup-img').src = img;
            document.getElementById('song-popup').style.display = 'flex';
            currentPopupSong = { title, artist, img, audio };
        }

        function closePopup() {
            document.getElementById('song-popup').style.display = 'none';
        }

        function playPopupSong() {
            const popupTitle = document.getElementById('popup-title').textContent;
            const popupArtist = document.getElementById('popup-artist').textContent;
            const popupImg = document.querySelector('.popup-img').src;
            const popupAudio = document.querySelector('.popup-img').src.replace('song', 'audio').replace('.jpg', '.mp3');
            document.getElementById('current-song').textContent = popupTitle;
            document.getElementById('current-artist').textContent = popupArtist;
            document.querySelector('.player-img').src = popupImg;
            audioPlayer.src = popupAudio;
            audioPlayer.play();
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
            closePopup();
        }

        function addToLibrary() {
            if (currentPopupSong && !librarySongs.some(song => song.title === currentPopupSong.title)) {
                librarySongs.push(currentPopupSong);
                closePopup();
                alert(currentPopupSong.title + ' added to library!');
            }
        }

        function togglePlay() {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
                document.getElementById('play-btn').textContent = '▶';
            } else {
                audioPlayer.play();
                isPlaying = true;
                document.getElementById('play-btn').textContent = '⏸';
            }
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % songs.length;
            updatePlayer();
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
            updatePlayer();
        }

        function updatePlayer() {
            const song = songs[currentSongIndex];
            document.getElementById('current-song').textContent = song.title;
            document.getElementById('current-artist').textContent = song.artist;
            document.querySelector('.player-img').src = song.img;
            audioPlayer.src = song.audio;
            audioPlayer.play();
            isPlaying = true;
            document.getElementById('play-btn').textContent = '⏸';
        }

        document.getElementById('song-popup').addEventListener('click', function(e) {
            if (e.target === this) {
                closePopup();
            }
        });

        audioPlayer.addEventListener('ended', function() {
            nextSong();
        });

        audioPlayer.addEventListener('timeupdate', function() {
            const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progress.style.width = progressPercent + '%';
        });

        progress.addEventListener('mousedown', function(e) {
            isDragging = true;
            updateProgress(e);
        });

        document.addEventListener('mousemove', function(e) {
            if (isDragging) {
                updateProgress(e);
            }
        });

        document.addEventListener('mouseup', function() {
            isDragging = false;
        });

        function updateProgress(e) {
            const width = progressBar.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            const percent = (clickX / width) * 100;
            audioPlayer.currentTime = (clickX / width) * duration;
            progress.style.width = percent + '%';
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - LodgeHub</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text&amp;family=Roboto:wght@400;700&amp;display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1><span class="logo">LodgeHub</span></h1>
        <nav>
            <ul>
                <li><a href="index.html" class="nav-btn">Search</a></li>
                <li><a href="members.html" class="nav-btn">Members</a></li>
                <li><a href="loans.html" class="nav-btn">Loans</a></li>
                <li><a href="overdue.html" class="nav-btn info-btn">Overdue</a></li>
            </ul>
        </nav>
    </header>

    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="card-icon auth"></div>
                <h2>Member Login</h2>
                <p>Access your account to manage loans.</p>
                <form id="auth-form">
                    <input type="email" placeholder="Email Address" required>
                    <input type="password" placeholder="Password" required>
                    <button type="submit" class="card-btn full">Sign In</button>
                </form>
                <p class="auth-link">Need an account? <a href="register.html">Register here</a></p>
            </div>
        </div>
    </main>

    <footer>
        <p>&amp;copy; 2024 LodgeHub Library System</p>
    </footer>

    <script src="utils.js"></script>
</body>
</html>

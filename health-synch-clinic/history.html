<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>History - LodgeHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav id="nav" class="nav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-building"></i>
                LodgeHub
            </div>
            <ul class="nav-links">
                <li><button class="nav-btn" onclick="location.href='index.html'">Home</button></li>
                <li><button class="nav-btn" onclick="location.href='book.html'">Book</button></li>
                <li><button class="nav-btn" onclick="location.href='staff.html'">Staff</button></li>
                <li><button class="nav-btn active" onclick="location.href='history.html'">History</button></li>
                <li class="nav-auth">
                    <button id="loginBtn" class="nav-btn" onclick="location.href='login.html'">Login</button>
                    <button id="regBtn" class="nav-btn reg-btn" onclick="location.href='register.html'">
                        Sign Up <i class="fas fa-check-circle verified-badge"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- History Content -->
    <main class="section" style="background: linear-gradient(120deg, #f8f9fa 80%, #e3f6f9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="max-width: 500px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,31,63,0.10); padding: 2.5rem 2rem; text-align: center;">
            <h2 style="color: #001F3F; margin-bottom: 1.5rem;">Medical History</h2>
            <p style="font-size: 1.2rem;">Please <strong>login</strong> to view your medical history and records.</p>
            <button class="cta-btn" style="margin-top: 2rem; background: linear-gradient(135deg, #17A2B8, #001F3F); color: white; font-weight: 600; border-radius: 50px; padding: 1rem 2rem; box-shadow: 0 4px 15px rgba(23,162,184,0.18);" onclick="location.href='login.html'">
                <i class="fas fa-sign-in-alt"></i> Login to View
            </button>
        </div>
    </main>

    <script>
        // Nav highlight
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - LodgeHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav id="nav" class="nav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-building"></i>
                LodgeHub
            </div>
            <ul class="nav-links">
                <li><button class="nav-btn" onclick="location.href='index.html'">Home</button></li>
                <li><button class="nav-btn" onclick="location.href='book.html'">Book</button></li>
                <li><button class="nav-btn" onclick="location.href='staff.html'">Staff</button></li>
                <li><button class="nav-btn" onclick="location.href='history.html'">History</button></li>
                <li class="nav-auth">
                    <button class="nav-btn" onclick="location.href='login.html'">Login</button>
                    <button class="nav-btn active reg-btn">
                        Sign Up <i class="fas fa-check-circle verified-badge"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Register Content -->
    <main class="section auth-section" style="background: linear-gradient(120deg, #f8f9fa 80%, #e3f6f9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="modal-content login-form" style="box-shadow: 0 12px 48px rgba(40,167,69,0.18); border-radius: 24px; background: white; max-width: 420px; width: 100%; padding: 3rem 2rem;">
            <h2 style="color: #001F3F; text-align: center; margin-bottom: 2rem;">Sign Up</h2>
            <form class="auth-form">
                <input type="text" placeholder="Full Name" required style="padding: 1rem; border-radius: 12px; border: 2px solid #e9ecef; font-size: 1rem; margin-bottom: 1.2rem;">
                <input type="email" placeholder="Email" required style="padding: 1rem; border-radius: 12px; border: 2px solid #e9ecef; font-size: 1rem; margin-bottom: 1.2rem;">
                <input type="password" placeholder="Password" required style="padding: 1rem; border-radius: 12px; border: 2px solid #e9ecef; font-size: 1rem; margin-bottom: 1.2rem;">
                <button type="submit" class="reg-submit verified" style="background: linear-gradient(135deg, #28a745, #20c997); color: white; font-weight: 600; border-radius: 50px; padding: 1rem 2rem; box-shadow: 0 4px 15px rgba(40,167,69,0.18);">Register <i class="fas fa-check-circle"></i> Verified</button>
            </form>
            <p style="text-align: center; margin-top: 1.5rem;">Already have an account? <button onclick="location.href='login.html'" class="link-btn" style="color: #17A2B8; background: none; border: none; cursor: pointer; font-weight: 600;">Login</button></p>
        </div>
    </main>

    <script>
        document.querySelector('.auth-form').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Registration successful! You are verified.');
            location.href = 'home.html';
        });

        // Nav highlight
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>

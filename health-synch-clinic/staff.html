<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff - LodgeHub</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&amp;display=swap" rel="stylesheet">
</head>
<body>
    <!-- Navigation -->
    <nav id="nav" class="nav">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-building"></i>
                LodgeHub
            </div>
            <ul class="nav-links">
                <li><button class="nav-btn" onclick="location.href='index.html'">Home</button></li>
                <li><button class="nav-btn" onclick="location.href='book.html'">Book</button></li>
                <li><button class="nav-btn active" onclick="location.href='staff.html'">Staff</button></li>
                <li><button class="nav-btn" onclick="location.href='history.html'">History</button></li>
                <li class="nav-auth">
                    <button id="loginBtn" class="nav-btn" onclick="location.href='login.html'">Login</button>
                    <button id="regBtn" class="nav-btn reg-btn" onclick="location.href='register.html'">
                        Sign Up <i class="fas fa-check-circle verified-badge"></i>
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <!-- Staff Content -->
    <main class="section" style="background: linear-gradient(120deg, #f8f9fa 80%, #e3f6f9 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div style="max-width: 900px; margin: 0 auto; background: white; border-radius: 24px; box-shadow: 0 8px 32px rgba(0,31,63,0.10); padding: 2.5rem 2rem;">
            <h2 style="color: #001F3F; text-align: center; margin-bottom: 2rem;">Our Staff</h2>
            <button id="availabilityBtn" class="info-btn" style="margin-bottom: 2.5rem;"><i class="fas fa-info-circle"></i> Availability</button>
            <div class="staff-grid">
                <div class="staff-card" style="box-shadow: 0 8px 32px rgba(0,31,63,0.10);">
                    <div class="staff-photo" style="background: url('https://randomuser.me/api/portraits/women/44.jpg') center/cover;"></div>
                    <h3>Dr. Jane Smith</h3>
                    <p class="role">Cardiologist</p>
                    <p class="availability available"><i class="fas fa-check"></i> Available Now</p>
                </div>
                <div class="staff-card" style="box-shadow: 0 8px 32px rgba(23,162,184,0.10);">
                    <div class="staff-photo" style="background: url('https://randomuser.me/api/portraits/men/32.jpg') center/cover;"></div>
                    <h3>Dr. John Doe</h3>
                    <p class="role">General Physician</p>
                    <p class="availability"><i class="fas fa-clock"></i> Next Available: 2pm</p>
                </div>
                <div class="staff-card" style="box-shadow: 0 8px 32px rgba(40,167,69,0.10);">
                    <div class="staff-photo" style="background: url('https://randomuser.me/api/portraits/women/65.jpg') center/cover;"></div>
                    <h3>Dr. Emily Wilson</h3>
                    <p class="role">Pediatrician</p>
                    <p class="availability available"><i class="fas fa-check"></i> Available Now</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const availabilityBtn = document.getElementById('availabilityBtn');
        const availabilities = document.querySelectorAll('.availability');
        
        availabilityBtn.addEventListener('click', function() {
            availabilities.forEach(avail => avail.classList.toggle('available'));
            const text = this.innerHTML.includes('Available') ? 'Hide Availability' : 'Availability';
            this.innerHTML = '<i class="fas fa-info-circle"></i> ' + text;
        });

        // Nav highlight
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
            });
        });
    </script>
</body>
</html>

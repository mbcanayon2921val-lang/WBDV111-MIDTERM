<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shipping Info - LodgeHub Store</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="shipping-container">
        <h1>📦 Shipping Information</h1>
        <p style="margin-bottom: 30px; color: #666;">Enter your shipping details to complete your order</p>
        
        <form class="shipping-form">
            <div class="form-group">
                <label for="shipName">Full Name</label>
                <input type="text" id="shipName" required>
            </div>
            <div class="form-group">
                <label for="shipEmail">Email</label>
                <input type="email" id="shipEmail" required>
            </div>
            <div class="form-group">
                <label for="shipAddress">Address</label>
                <input type="text" id="shipAddress" placeholder="Street address" required>
            </div>
            <div class="form-group">
                <label for="shipCity">City</label>
                <input type="text" id="shipCity" required>
            </div>
            <div class="form-group">
                <label for="shipZip">ZIP Code</label>
                <input type="text" id="shipZip" required>
            </div>
            <div class="form-group">
                <label for="shipMethod">Shipping Method</label>
                <select id="shipMethod" required>
                    <option value="">Select method</option>
                    <option value="standard">Standard (5-7 days) - $5.99</option>
                    <option value="express">Express (2-3 days) - $12.99</option>
                    <option value="overnight">Overnight - $29.99</option>
                </select>
            </div>
            <button type="submit">Confirm Order & Track Package →</button>
        </form>
        
        <div style="margin-top: 30px; padding: 20px; background: #f0f8ff; border-radius: 8px;">
            <h3>Order Summary</h3>
            <div id="orderSummary">
                Cart loaded from localStorage...
            </div>
        </div>
    </div>

    <script>
        // Load cart
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const summary = document.getElementById('orderSummary');
        
        if (cart.length === 0) {
            summary.innerHTML = '<p style="color: #999;">No items in cart</p>';
        } else {
            let total = 0;
            let html = '';
            cart.forEach(item => {
                const subtotal = (item.price * item.quantity).toFixed(2);
                total += parseFloat(subtotal);
                html += `<div style="display: flex; justify-content: space-between; margin-bottom: 8px;">
                    <span>${item.name} x${item.quantity}</span>
                    <span>$${subtotal}</span>
                </div>`;
            });
            html += `<div style="border-top: 1px solid #ddd; padding-top: 10px; font-weight: bold;">
                Total: $${total.toFixed(2)}
            </div>`;
            summary.innerHTML = html;
        }

        document.querySelector('.shipping-form').addEventListener('submit', (e) => {
            e.preventDefault();
            // Track demo ID
            const orderId = 'LH' + Date.now();
            localStorage.setItem('orderId', orderId);
            alert(`Order confirmed! Your tracking ID: ${orderId}\nRedirecting to tracking...`);
            window.location.href = 'tracking.html';
        });
    </script>
</body>
</html>
